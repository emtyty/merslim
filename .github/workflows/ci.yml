name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify package contents
        run: npm pack --dry-run

  headless-example:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Run headless example end-to-end
        working-directory: examples/headless
        run: |
          npm install
          npm start

      - name: Confirm SVGs were generated
        run: |
          test -f examples/headless/out/flowchart.svg
          test -f examples/headless/out/pie.svg
          test -f examples/headless/out/c4-context.svg
